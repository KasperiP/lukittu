paths:
  /api/v1/dev/teams/{teamId}/releases:
    get:
      summary: 'List Releases'
      operationId: 'listReleases'
      description: |
        Retrieve a paginated list of releases for a specific product within the team.
        Results can be filtered by version search and release status.
      tags:
        - Dev - Releases
      parameters:
        - $ref: '../../components/parameters/common.yaml#/components/parameters/TeamId'
        - $ref: '../../components/parameters/pagination.yaml#/components/parameters/Page'
        - $ref: '../../components/parameters/pagination.yaml#/components/parameters/PageSize'
        - $ref: '../../components/parameters/pagination.yaml#/components/parameters/SortDirection'
        - name: productId
          in: query
          required: true
          description: 'UUID of the product to list releases for'
          schema:
            $ref: '../../components/schemas/common.yaml#/components/schemas/UUID'
          example: '789e0123-e89b-12d3-a456-426614174222'
        - name: sortColumn
          in: query
          required: false
          description: 'Column to sort by'
          schema:
            type: string
            enum: [version, createdAt, updatedAt, latest]
            default: createdAt
          example: 'createdAt'
        - name: search
          in: query
          required: false
          description: 'Search releases by version (case-insensitive partial match)'
          schema:
            type: string
          example: '1.0'
        - name: status
          in: query
          required: false
          description: 'Filter releases by status'
          schema:
            $ref: '../../components/schemas/product.yaml#/components/schemas/ReleaseStatus'
          example: 'PUBLISHED'
      responses:
        '200':
          description: 'Releases retrieved successfully'
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/product.yaml#/components/schemas/ReleaseListResponse'
              example:
                data:
                  releases:
                    - id: '456e7890-e89b-12d3-a456-426614174111'
                      version: '1.0.0'
                      status: 'PUBLISHED'
                      latest: true
                      productId: '789e0123-e89b-12d3-a456-426614174222'
                      branchId: null
                      teamId: '123e4567-e89b-12d3-a456-426614174000'
                      createdAt: '2023-09-15T14:30:00Z'
                      updatedAt: '2023-09-15T14:30:00Z'
                      metadata: []
                      product:
                        id: '789e0123-e89b-12d3-a456-426614174222'
                        name: 'My Product'
                      branch: null
                      file: null
                      allowedLicenses: []
                  hasNextPage: false
                  totalResults: 1
                result:
                  timestamp: '2023-09-15T14:30:00Z'
                  valid: true
                  details: 'Releases found'
        '4XX':
          $ref: '../../components/responses/common.yaml#/components/responses/StandardError'
        '5XX':
          $ref: '../../components/responses/common.yaml#/components/responses/StandardError'
      security:
        - bearerAuth: []

    post:
      summary: 'Create Release'
      operationId: 'createRelease'
      description: |
        Create a new release for a product. Supports optional file upload via multipart/form-data.

        The request body must be sent as `multipart/form-data` with:
        - `data` field (required): JSON string containing the release configuration
        - `file` field (optional): Binary file to attach to the release (max 10 MB)

        File uploads require the team to have the classloader feature enabled (paid subscription).
      tags:
        - Dev - Releases
      parameters:
        - $ref: '../../components/parameters/common.yaml#/components/parameters/TeamId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: string
                  description: |
                    JSON string containing the release configuration. Must be a valid JSON object with the following fields:
                    - `version` (string, required): Release version (3-255 chars, no spaces)
                    - `productId` (string, required): UUID of the product
                    - `status` (string, required): One of PUBLISHED, DRAFT, DEPRECATED, ARCHIVED
                    - `setAsLatest` (boolean, optional): Whether to set this as the latest release (default: false)
                    - `branchId` (string|null, optional): UUID of the branch (default: null)
                    - `metadata` (array, optional): Array of key-value metadata objects (max 20)
                    - `licenseIds` (array, optional): Array of license UUIDs to restrict access (max 30)
                file:
                  type: string
                  format: binary
                  description: 'Optional file to attach to the release (max 10 MB). Must have a file extension.'
      responses:
        '201':
          description: 'Release created successfully'
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/product.yaml#/components/schemas/ReleaseResponse'
              example:
                data:
                  id: '456e7890-e89b-12d3-a456-426614174111'
                  version: '1.0.0'
                  status: 'PUBLISHED'
                  latest: true
                  productId: '789e0123-e89b-12d3-a456-426614174222'
                  branchId: null
                  teamId: '123e4567-e89b-12d3-a456-426614174000'
                  createdAt: '2023-09-15T14:30:00Z'
                  updatedAt: '2023-09-15T14:30:00Z'
                  metadata: []
                  product:
                    id: '789e0123-e89b-12d3-a456-426614174222'
                    name: 'My Product'
                  branch: null
                  file: null
                result:
                  timestamp: '2023-09-15T14:30:00Z'
                  valid: true
                  details: 'Release created'
        '4XX':
          $ref: '../../components/responses/common.yaml#/components/responses/StandardError'
        '5XX':
          $ref: '../../components/responses/common.yaml#/components/responses/StandardError'
      security:
        - bearerAuth: []

  /api/v1/dev/teams/{teamId}/releases/{releaseId}:
    put:
      summary: 'Update Release'
      operationId: 'updateRelease'
      description: |
        Update an existing release. Supports optional file upload/replacement via multipart/form-data.

        The request body must be sent as `multipart/form-data` with:
        - `data` field (required): JSON string containing the release configuration
        - `file` field (optional): Binary file to attach to the release (max 10 MB)

        **File handling:**
        - To upload a new file (replacing any existing): include the `file` field
        - To keep the existing file unchanged: omit the `file` field and set `keepExistingFile` to `true`
        - To remove the existing file without uploading a new one: omit the `file` field and set `keepExistingFile` to `false`

        File uploads require the team to have the classloader feature enabled (paid subscription).
      tags:
        - Dev - Releases
      parameters:
        - $ref: '../../components/parameters/common.yaml#/components/parameters/TeamId'
        - $ref: '../../components/parameters/common.yaml#/components/parameters/ReleaseIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: string
                  description: |
                    JSON string containing the release configuration. Must be a valid JSON object with the following fields:
                    - `version` (string, required): Release version (3-255 chars, no spaces)
                    - `productId` (string, required): UUID of the product
                    - `status` (string, required): One of PUBLISHED, DRAFT, DEPRECATED, ARCHIVED
                    - `setAsLatest` (boolean, required): Whether to set this as the latest release
                    - `keepExistingFile` (boolean, required): Whether to keep the existing file when no new file is uploaded
                    - `branchId` (string|null, required): UUID of the branch or null
                    - `metadata` (array, required): Array of key-value metadata objects (max 20)
                    - `licenseIds` (array, required): Array of license UUIDs to restrict access (max 30)
                file:
                  type: string
                  format: binary
                  description: 'Optional file to attach to the release (max 10 MB). Must have a file extension. Replaces any existing file.'
      responses:
        '200':
          description: 'Release updated successfully'
          content:
            application/json:
              schema:
                $ref: '../../components/schemas/product.yaml#/components/schemas/ReleaseResponse'
              example:
                data:
                  id: '456e7890-e89b-12d3-a456-426614174111'
                  version: '1.1.0'
                  status: 'PUBLISHED'
                  latest: true
                  productId: '789e0123-e89b-12d3-a456-426614174222'
                  branchId: null
                  teamId: '123e4567-e89b-12d3-a456-426614174000'
                  createdAt: '2023-09-15T14:30:00Z'
                  updatedAt: '2023-09-15T14:35:00Z'
                  metadata: []
                  product:
                    id: '789e0123-e89b-12d3-a456-426614174222'
                    name: 'My Product'
                  branch: null
                  file: null
                result:
                  timestamp: '2023-09-15T14:35:00Z'
                  valid: true
                  details: 'Release updated'
        '4XX':
          $ref: '../../components/responses/common.yaml#/components/responses/StandardError'
        '5XX':
          $ref: '../../components/responses/common.yaml#/components/responses/StandardError'
      security:
        - bearerAuth: []
